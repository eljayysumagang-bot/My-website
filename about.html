<!DOCTYPE html>
<html>
<head>
  <title>About - My Website</title>

  <!-- ✅ Mobile support -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    /* Header */
    .header {
      background: #4CAF50;
      color: white;
      padding: 20px;
      text-align: center;
    }

    /* Navigation */
    .nav {
      display: flex;
      flex-wrap: wrap;
      background: #333;
    }

    .nav a {
      flex: 1;
      text-align: center;
      color: white;
      padding: 14px;
      text-decoration: none;
    }

    .nav a:hover {
      background: #ddd;
      color: black;
    }

    /* Content */
    .container {
      padding: 20px;
    }

    /* Card style */
    .card {
      background: #f9f9f9;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }

    /* Footer */
    .footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 10px;
      position: relative;
    }

    /* 📱 Mobile adjustments */
    @media (max-width: 600px) {
      .header h1 {
        font-size: 24px;
      }

      .nav a {
        flex: 100%;
        border-top: 1px solid #444;
      }

      .container {
        padding: 15px;
      }
    }
  </style>
</head>

<body>

  <!-- Header -->
  <div class="header">
    <h1>About Us</h1>
    <p>Learn more about this website</p>
  </div>

  <!-- Navigation -->
  <div class="nav">
    <a href="main.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </div>

  <!-- Content -->
  <div class="container">

    <div class="card">
      <h2>Who am I</h2>
      <p>This is my website that I created while learning web development.</p>
    </div>

    <div class="card">
      <h3>My Goal</h3>
      <p>To learn HTML, CSS, and JavaScript and build real websites.</p>
    </div>

    <div class="card">
      <h3>Skills Used</h3>
      <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
      </ul>
    </div>

  </div>

  <!-- Footer -->
  <div class="footer">
    <p>© 2026 My Website</p>
  </div>

</body>
</html>
